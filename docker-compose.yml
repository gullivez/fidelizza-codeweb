services:

  postgres:
    image: postgres:16

    container_name: fidelizza-postgres

    environment:
      POSTGRES_DB: fidelizza
      POSTGRES_USER: fidelizza
      POSTGRES_PASSWORD: fidelizza
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-fidelizza_app}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: fidelizza-redis

    command:
      - redis-server
      - --appendonly
      - yes
      - --maxmemory-policy
      - noeviction

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: