name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fidelizza
          POSTGRES_USER: fidelizza
          POSTGRES_PASSWORD: fidelizza
          POSTGRES_APP_PASSWORD: fidelizza_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      # App conecta como fidelizza_app (sem BYPASSRLS) — prova o isolamento de tenant
      DATABASE_URL: postgresql://fidelizza_app:fidelizza_app@localhost:5432/fidelizza
      # Migrations e seed conectam como superuser
      DATABASE_MIGRATION_URL: postgresql://fidelizza:fidelizza@localhost:5432/fidelizza
      POSTGRES_APP_PASSWORD: fidelizza_app
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-secret-placeholder-must-be-32-chars-long
      JWT_REFRESH_SECRET: ci-refresh-secret-placeholder-32-chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create app role in PostgreSQL
        run: |
          PGPASSWORD=fidelizza psql -h localhost -U fidelizza -d fidelizza -c \
            "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'fidelizza_app') THEN CREATE ROLE fidelizza_app LOGIN PASSWORD 'fidelizza_app'; END IF; END\$\$; GRANT CONNECT ON DATABASE fidelizza TO fidelizza_app; GRANT USAGE ON SCHEMA public TO fidelizza_app; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO fidelizza_app; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT ON SEQUENCES TO fidelizza_app;"

      - name: Run migrations
        run: npm run migrate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Integration tests (tenant isolation)
        run: npm run test:integration

      - name: Build
        run: npm run build
