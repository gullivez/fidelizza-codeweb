name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://fidelizza:fidelizza@localhost:5432/fidelizza
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-secret-placeholder-must-be-32-chars-long
      JWT_REFRESH_SECRET: ci-refresh-secret-placeholder-32-chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
