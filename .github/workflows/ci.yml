name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_ENV: test
      PORT: 3000
      # App conecta como fidelizza_app (sem BYPASSRLS) — prova o isolamento de tenant
      DATABASE_URL: postgresql://fidelizza_app:postgres@localhost:5432/fidelizza_test
      # Migrations e seed conectam como superuser
      DATABASE_MIGRATION_URL: postgresql://postgres:postgres@localhost:5432/fidelizza_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-secret-placeholder-must-be-32-chars-long
      JWT_REFRESH_SECRET: ci-refresh-secret-placeholder-32-chars
      AES_SECRET: ci-aes-secret-placeholder-must-be-32-characters
      BULL_BOARD_USER: ci-bull-board-user
      BULL_BOARD_PASSWORD: ci-bull-board-password-placeholder

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fidelizza_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d fidelizza_test -c "
            CREATE USER fidelizza_app WITH PASSWORD 'postgres';
            GRANT CONNECT ON DATABASE fidelizza_test TO fidelizza_app;
            GRANT USAGE ON SCHEMA public TO fidelizza_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public
              GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO fidelizza_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public
              GRANT USAGE, SELECT ON SEQUENCES TO fidelizza_app;
          "

      - name: Run migrations
        run: npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fidelizza_test

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Integration tests (tenant isolation)
        run: npm run test:integration

      - name: Build
        run: npm run build
